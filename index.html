<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>애플짱 | 디지털 명함</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="card">
    <div class="card-inner">
      <div class="face-area">
        <div class="apple-character" id="apple">
          <div class="apple-body"></div>
          <div class="apple-leaf"></div>
          <div class="apple-stem"></div>
          <div class="apple-face">
            <div class="eye left"></div>
            <div class="eye right"></div>
            <div class="blush left"></div>
            <div class="blush right"></div>
            <div class="mouth"></div>
          </div>
        </div>
      </div>
      <div class="info">
        <h1 class="name">애플짱</h1>
        <p class="job">바이브코딩 학습자</p>
        <p class="intro">코딩과 함께 성장하는 하루를 만들어요 🍎</p>
        <div class="contact">
          <a href="tel:000-0000-0000" class="contact-link">OOO-OOOO-OOOO</a>
          <a href="mailto:OOOOO@gmail.com" class="contact-link">OOOOO@gmail.com</a>
        </div>
      </div>
      <button type="button" class="share-btn" id="shareBtn">명함 공유하기</button>
      <a href="index.html?bg=gradient" target="_blank" class="bg-btn">고급 배경으로 보기</a>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
